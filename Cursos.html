<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Cursos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:linear-gradient(135deg,#e8f8f5,#fff6d5);
}

h1{
text-align:center;
background:linear-gradient(90deg,#27ae60,#f1c40f,#e67e22);
color:white;
padding:20px;
margin:0;
}

/* LAYOUT */

.container{
display:flex;
gap:30px;
padding:30px;
}

/* PANEL IZQUIERDO */

.panel{
flex:1;
display:flex;
flex-direction:column;
gap:20px;
}

/* RESULTADOS DERECHA */

.resultados{
flex:2;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* TARJETAS */

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h2{
margin-top:0;
color:#2c8f5a;
}

/* INPUTS */

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* BOTONES */

button,input[type="submit"]{
background:linear-gradient(90deg,#27ae60,#f1c40f,#e67e22);
border:none;
color:white;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover,input[type="submit"]:hover{
transform:scale(1.05);
}

/* TABLA */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#27ae60;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#fff7cc;
}

</style>

<script>

function mostrarCursosTabla(cursos){

let tabla =
`
<table>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Curso</th>
<th>Descripción</th>
<th>Precio</th>
</tr>
`;

cursos.forEach(curso=>{
tabla+=`
<tr>
<td>${curso.id}</td>
<td>${curso.nombre}</td>
<td>${curso.nombre_curso}</td>
<td>${curso.descripcion}</td>
<td>${curso.precio}</td>
</tr>
`;
});

tabla+="</table>";

document.getElementById("resultado").innerHTML=tabla;

}

async function obtenerCursos(){

const response=await fetch('http://localhost:60941/api/cursos');
const data=await response.json();

mostrarCursosTabla(data);

}

async function obtenerCursoPorId(){

const id=document.getElementById('cursoId').value;

const response=await fetch('http://localhost:60941/api/cursos/'+id);
const data=await response.json();

mostrarCursosTabla([data]);

}

async function guardarCurso(){

const nombre=document.getElementById('nombre').value;
const nombre_curso=document.getElementById('nombre_curso').value;
const descripcion=document.getElementById('descripcion').value;
const precio=parseFloat(document.getElementById('precio').value);

const response=await fetch('http://localhost:60941/api/cursos',{

method:'POST',
headers:{'Content-Type':'application/json'},

body:JSON.stringify({
nombre,
nombre_curso,
descripcion,
precio
})

});

const data=await response.json();

alert("Curso guardado correctamente");

obtenerCursos();

}

async function eliminarCurso(){

const id=document.getElementById('cursoIdEliminar').value;

await fetch('http://localhost:60941/api/cursos/'+id,{
method:'DELETE'
});

alert("Curso eliminado");

obtenerCursos();

}

</script>

</head>

<body>
	<!-- Este código va al inicio del <body> de cada página -->
	<nav class="menu">
	    <ul>
	        <li><a href="Cursos.html">Cursos</a></li>
	        <li><a href="Alumnos.html">Alumnos</a></li>
	        <li><a href="Profesores.html">Profesores</a></li>
	    </ul>
	</nav>

	<style>
	/* Estilo del menú superior */
	.menu {
	    width: 100%;
	    background: linear-gradient(90deg, #555555, #888888, #aaaaaa);
	    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
	    position: sticky; /* Fija el menú al hacer scroll */
	    top: 0;
	    z-index: 1000;
	}

	.menu ul {
	    list-style: none;
	    margin: 0;
	    padding: 0;
	    display: flex;
	    justify-content: center;
	}

	.menu ul li {
	    margin: 0 15px;
	}

	.menu ul li a {
	    display: block;
	    padding: 15px 20px;
	    color: white;
	    font-weight: bold;
	    text-decoration: none;
	    transition: 0.3s;
	    font-family: 'Poppins', sans-serif;
	}

	.menu ul li a:hover {
	    background-color: rgba(255,255,255,0.2);
	    border-radius: 8px;
	}
	</style>

<h1>Gestión de Cursos</h1>

<div class="container">

<!-- PANEL IZQUIERDO -->

<div class="panel">

<div class="card">

<h2>Ver cursos</h2>

<button onclick="obtenerCursos()">Mostrar todos</button>

</div>

<div class="card">

<h2>Buscar curso</h2>

<input type="text" id="cursoId" placeholder="ID del curso">

<button onclick="obtenerCursoPorId()">Buscar</button>

</div>

<div class="card">

<h2>Nuevo curso</h2>

<form onsubmit="event.preventDefault();guardarCurso();">

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="nombre_curso" placeholder="Nombre curso">

<input type="text" id="descripcion" placeholder="Descripción">

<input type="number" id="precio" placeholder="Precio">

<input type="submit" value="Guardar curso">

</form>

</div>

<div class="card">

<h2>Eliminar curso</h2>

<input type="text" id="cursoIdEliminar" placeholder="ID">

<button onclick="eliminarCurso()">Eliminar</button>

</div>

</div>

<!-- RESULTADOS DERECHA -->

<div class="resultados">

<h2>Resultados</h2>

<div id="resultado">

Pulsa "Mostrar todos" para ver los cursos.

</div>

</div>

</div>

</body>
</html>

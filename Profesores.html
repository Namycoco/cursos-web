<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Profesores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:linear-gradient(135deg,#f3e5f5,#e1bee7);
}

h1{
    text-align:center;
    background:linear-gradient(90deg,#8e24aa,#ab47bc,#ce93d8);
    color:white;
    padding:20px;
    margin:0;
}

/* LAYOUT */
.container{
    display:flex;
    gap:30px;
    padding:30px;
}

/* PANEL IZQUIERDO */
.panel{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* RESULTADOS DERECHA */
.resultados{
    flex:2;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.resultados h2{
    margin-top:0;
    color:#6a1b9a;
}

/* TARJETAS */
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h2{
    margin-top:0;
    color:#6a1b9a;
}

/* INPUTS */
input[type="text"], input[type="email"], input[type="number"] {
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ce93d8;
}

/* BOTONES */
button,input[type="submit"]{
    background:linear-gradient(90deg,#8e24aa,#ab47bc,#ce93d8);
    border:none;
    color:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover,input[type="submit"]:hover{
    transform:scale(1.05);
    background:linear-gradient(90deg,#6a1b9a,#8e24aa,#ba68c8);
}

/* TABLA BONITA */
.resultados table {
    width: 100%;          /* ocupa todo el espacio disponible */
    table-layout: fixed;  /* fuerza que las columnas tengan ancho proporcional */
    border-collapse: collapse;
}
.resultados th {
    background: linear-gradient(90deg, #ab47bc); /* gradiente morado */
    color: white;
    padding: 6px 8px;
    font-size: 0.9rem;    /* un poco más pequeño para que quepa todo */
    text-align: left;
	}

.resultados td {
    padding: 6px 8px;     /* margen más compacto */
    overflow: hidden;     /* corta texto que exceda la celda */
    text-overflow: ellipsis; /* agrega "..." si el texto es muy largo */
    white-space: nowrap;   /* evita que el texto haga salto de línea */
    font-size: 0.9rem;    /* un poco más pequeño para que quepa todo */
    border-bottom:1px solid #eee;
}

.resultados tr:hover{
    background:#f3e5f5;
}

.resultados tr:nth-child(even){
    background:#f9f5fc;
}

.resultados tr:nth-child(odd){
    background:#ffffff;
}
</style>

<script>
// --- FUNCIONES PARA MOSTRAR TABLA ---
function mostrarProfesoresTabla(profesores){
    if(!profesores || profesores.length === 0){
        document.getElementById('resultado').innerHTML = '<p>No hay profesores para mostrar.</p>';
        return;
    }

    let tabla = `
    <table>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Domicilio</th>
            <th>Ciudad</th>
            <th>Provincia</th>
            <th>Código Postal</th>
            <th>Email</th>
        </tr>
    `;

    profesores.forEach(p => {
        tabla += `
        <tr>
            <td>${p.id}</td>
            <td>${p.nombre}</td>
            <td>${p.apellidos}</td>
            <td>${p.domicilio}</td>
            <td>${p.ciudad}</td>
            <td>${p.provincia}</td>
            <td>${p.cp}</td>
            <td>${p.email}</td>
        </tr>
        `;
    });

    tabla += `</table>`;
    document.getElementById('resultado').innerHTML = tabla;
}

// --- FETCH API ---
async function obtenerProfesores() {
    try {
        const response = await fetch('http://localhost:9090/api/profesores');
        if (!response.ok) throw new Error('Error en la solicitud: ' + response.statusText);
        const data = await response.json();
        mostrarProfesoresTabla(data);
    } catch (error) {
        console.error(error);
        document.getElementById('resultado').innerHTML = `<p style="color:red;">${error.message}</p>`;
    }
}

async function obtenerProfesorPorId() {
    const id = document.getElementById('profesorId').value;
    try {
        const response = await fetch('http://localhost:9090/api/profesores/' + id);
        if (!response.ok) throw new Error('Error en la solicitud: ' + response.statusText);
        const data = await response.json();
        mostrarProfesoresTabla([data]);
    } catch (error) {
        console.error(error);
        document.getElementById('resultado').innerHTML = `<p style="color:red;">${error.message}</p>`;
    }
}

async function guardarProfesor() {
    const nombre = document.getElementById('nombre').value;
    const apellidos = document.getElementById('apellidos').value;
    const domicilio = document.getElementById('domicilio').value;
    const ciudad = document.getElementById('ciudad').value;
    const provincia = document.getElementById('provincia').value;
    const cp = document.getElementById('cp').value;
    const email = document.getElementById('email').value;

    try {
        const response = await fetch('http://localhost:9090/api/profesores', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({nombre,apellidos,domicilio,ciudad,provincia,cp,email})
        });
        if (!response.ok) throw new Error('Error en la solicitud: ' + response.statusText);
        const data = await response.json();
        alert("Profesor guardado correctamente");
        obtenerProfesores();
    } catch (error) {
        console.error(error);
        document.getElementById('resultado').innerHTML = `<p style="color:red;">${error.message}</p>`;
    }
}

async function eliminarProfesor() {
    const id = document.getElementById('profesorIdEliminar').value;
    try {
        const response = await fetch('http://localhost:9090/api/profesores/' + id, { method:'DELETE' });
        if (!response.ok) throw new Error('Error en la solicitud: ' + response.statusText);
        alert("Profesor eliminado correctamente");
        obtenerProfesores();
    } catch (error) {
        console.error(error);
        document.getElementById('resultado').innerHTML = `<p style="color:red;">${error.message}</p>`;
    }
}
</script>

</head>
<body>
<!-- MENÚ -->
<nav class="menu">
    <ul>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="alumnos.html">Alumnos</a></li>
        <li><a href="profesores.html">Profesores</a></li>
    </ul>
</nav>

<style>
.menu {
    width: 100%;
    background: linear-gradient(90deg, #555555, #888888, #aaaaaa);
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.menu ul {
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
}

.menu ul li{
    margin:0 15px;
}

.menu ul li a{
    display:block;
    padding:15px 20px;
    color:white;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
    font-family: 'Poppins',sans-serif;
}

.menu ul li a:hover{
    background-color: rgba(255,255,255,0.2);
    border-radius:8px;
}
</style>

<h1>Gestión de Profesores</h1>

<div class="container">
    <!-- PANEL IZQUIERDO -->
    <div class="panel">
        <div class="card">
            <h2>Ver todos los profesores</h2>
            <button onclick="obtenerProfesores()">Mostrar todos</button>
        </div>
        <div class="card">
            <h2>Buscar profesor</h2>
            <input type="text" id="profesorId" placeholder="ID del Profesor">
            <button onclick="obtenerProfesorPorId()">Buscar</button>
        </div>
        <div class="card">
            <h2>Nuevo profesor</h2>
            <form onsubmit="event.preventDefault(); guardarProfesor();">
                <input type="text" id="nombre" placeholder="Nombre">
                <input type="text" id="apellidos" placeholder="Apellidos">
                <input type="text" id="domicilio" placeholder="Domicilio">
                <input type="text" id="ciudad" placeholder="Ciudad">
                <input type="text" id="provincia" placeholder="Provincia">
                <input type="text" id="cp" placeholder="Código Postal">
                <input type="text" id="email" placeholder="Email">
                <input type="submit" value="Guardar Profesor">
            </form>
        </div>
        <div class="card">
            <h2>Eliminar profesor</h2>
            <input type="text" id="profesorIdEliminar" placeholder="ID del Profesor">
            <button onclick="eliminarProfesor()">Eliminar</button>
        </div>
    </div>

    <!-- RESULTADOS DERECHA -->
    <div class="resultados">
        <h2>Resultados</h2>
        <div id="resultado">Pulsa "Mostrar todos" para ver los profesores.</div>
    </div>
</div>

</body>
</html>

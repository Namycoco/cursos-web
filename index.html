<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Educativo</title>
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 3rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

   nav a {
  padding: 15px 30px;
  background-color: #ffffff30; /* fondo semi-transparente */
  color: white;
  font-weight: bold;
  text-decoration: none;
  font-size: 1.2rem;
  border-radius: 10px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

nav a:hover {
  background-color: #fffb00; /* fondo amarillo brillante al pasar mouse */
  color: #333; /* texto oscuro al hacer hover */
  transform: translateY(-3px);
  box-shadow: 0 6px 8px rgba(0,0,0,0.3);
}
    }

    nav a:hover {
      background-color: rgba(255, 255, 255, 0.5);
      color: #333;
      transform: translateY(-3px);
      box-shadow: 0 6px 8px rgba(0,0,0,0.3);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bienvenido al Portal Educativo</h1>
    <p>Selecciona una sección para navegar</p>
  </header>

  <nav>
    <a href="Alumnos.html">Alumnos</a>
    <a href="Profesores.html">Profesores</a>
    <a href="Cursos.html">Cursos</a>
  </nav>

  <footer>
    &copy; 2026 Portal Educativo. Todos los derechos reservados.
  </footer>
</body>
</html>
